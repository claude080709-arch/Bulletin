<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bulletin — 포트폴리오 AI 뉴스 브리핑</title>
<link rel="preconnect" href="https://fonts.bunny.net">
<link href="https://fonts.bunny.net/css?family=bebas-neue:400|dm-mono:400,500|noto-sans-kr:400,500,700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
:root{
  --void:#0A0E13;
  --surface:#111820;
  --surface-2:#182030;
  --gold:#BF9B5E;
  --gold-bright:#E4BA6A;
  --text:#E8E3D9;
  --muted:rgba(232,227,217,.48);
  --positive:#52C97E;
  --negative:#E85858;
  --border:rgba(232,227,217,.07);
  --border-gold:rgba(191,155,94,.28);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:var(--void);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;overflow-x:hidden;}

/* NOISE */
.noise-overlay{position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.03;mix-blend-mode:overlay;}

/* SCREENS */
.screen{display:none;}
.screen.active{display:flex;}

/* ── AUTH ── */
#screen-auth{min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:2rem;position:relative;}
.auth-bg{
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 70% 50% at 15% 85%,rgba(191,155,94,.07) 0%,transparent 55%),
    radial-gradient(ellipse 50% 40% at 85% 15%,rgba(82,201,126,.04) 0%,transparent 50%),
    var(--void);
}
.auth-content{position:relative;z-index:1;text-align:center;max-width:380px;width:100%;}
.auth-logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(4.5rem,13vw,7.5rem);letter-spacing:.06em;line-height:1;color:var(--text);margin-bottom:.35rem;}
.auth-logo span{color:var(--gold);}
.auth-tagline{font-family:'DM Mono',monospace;font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:2.5rem;}
.auth-rule{width:36px;height:1px;background:var(--border-gold);margin:0 auto 2.5rem;}
.btn-google{
  width:100%;padding:.95rem 1.5rem;
  background:var(--gold);color:var(--void);
  border:none;border-radius:.5rem;
  font-family:'DM Mono',monospace;font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;
  cursor:pointer;font-weight:500;
  display:flex;align-items:center;justify-content:center;gap:.75rem;
  transition:background .2s,transform .15s;margin-bottom:.65rem;
}
.btn-google:hover{background:var(--gold-bright);transform:translateY(-1px);}
.btn-guest{
  width:100%;padding:.85rem 1.5rem;
  background:transparent;color:var(--muted);
  border:1px solid var(--border);border-radius:.5rem;
  font-family:'DM Mono',monospace;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;
  cursor:pointer;transition:border-color .2s,color .2s;
}
.btn-guest:hover{border-color:var(--border-gold);color:var(--text);}
.auth-disclaimer{margin-top:2.5rem;font-size:.65rem;color:rgba(232,227,217,.28);line-height:1.7;}

/* ── APP ── */
#screen-app{flex-direction:column;min-height:100vh;}

/* NAVBAR */
.navbar{
  position:fixed;top:0;left:0;right:0;z-index:100;height:52px;
  background:rgba(10,14,19,.88);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 1.25rem;gap:1rem;
}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:1.45rem;letter-spacing:.05em;color:var(--text);flex-shrink:0;}
.nav-logo span{color:var(--gold);}
.nav-sep{width:1px;height:18px;background:var(--border);flex-shrink:0;}
.nav-tabs{display:flex;align-items:center;gap:.2rem;flex:1;overflow-x:auto;scrollbar-width:none;}
.nav-tabs::-webkit-scrollbar{display:none;}
.nav-tab{
  padding:.3rem .75rem;border-radius:.3rem;
  font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:.05em;
  cursor:pointer;border:1px solid transparent;
  transition:all .15s;white-space:nowrap;
  color:var(--muted);background:transparent;
}
.nav-tab:hover{color:var(--text);border-color:var(--border);}
.nav-tab.active{color:var(--gold);border-color:var(--border-gold);background:rgba(191,155,94,.08);}
.nav-tab.add-tab{color:var(--muted);border:1px dashed rgba(232,227,217,.12);}
.nav-tab.add-tab:hover{color:var(--gold);border-color:var(--border-gold);}
.nav-right{display:flex;align-items:center;gap:.6rem;flex-shrink:0;}
.nav-user{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--muted);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.btn-nav-action{
  padding:.28rem .7rem;background:transparent;
  border:1px solid var(--border);border-radius:.3rem;
  color:var(--muted);font-family:'DM Mono',monospace;font-size:.62rem;
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.btn-nav-action:hover{border-color:var(--border-gold);color:var(--gold);}

/* MAIN */
.main-content{margin-top:52px;padding:1.75rem 1.5rem 4rem;max-width:880px;margin-left:auto;margin-right:auto;width:100%;}

/* GUEST NOTICE */
.guest-notice{
  background:rgba(191,155,94,.06);border:1px solid var(--border-gold);border-radius:.5rem;
  padding:.65rem 1.1rem;margin-bottom:1.5rem;
  display:flex;align-items:center;justify-content:space-between;gap:1rem;
}
.guest-notice-text{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--gold);letter-spacing:.04em;}
.btn-login-prompt{
  padding:.28rem .75rem;background:var(--gold);color:var(--void);
  border:none;border-radius:.3rem;font-family:'DM Mono',monospace;font-size:.62rem;
  letter-spacing:.06em;cursor:pointer;font-weight:500;flex-shrink:0;transition:background .15s;
}
.btn-login-prompt:hover{background:var(--gold-bright);}

/* SEARCH */
.search-section{margin-bottom:1.75rem;}
.search-label{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:.45rem;display:block;}
.search-wrapper{position:relative;}
.search-input{
  width:100%;padding:.8rem 1.1rem;background:var(--surface);
  border:1px solid var(--border);border-radius:.45rem;
  color:var(--text);font-family:'DM Mono',monospace;font-size:.875rem;
  outline:none;transition:border-color .2s;
}
.search-input:focus{border-color:var(--border-gold);}
.search-input::placeholder{color:rgba(232,227,217,.2);}
.search-dropdown{
  position:absolute;top:calc(100% + .3rem);left:0;right:0;
  background:var(--surface);border:1px solid rgba(232,227,217,.1);
  border-radius:.45rem;overflow:hidden;z-index:200;
  box-shadow:0 12px 40px rgba(0,0,0,.5);display:none;
}
.search-dropdown.open{display:block;}
.search-item{
  padding:.7rem 1.1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);transition:background .1s;
}
.search-item:last-child{border-bottom:none;}
.search-item:hover{background:var(--surface-2);}
.search-item-name{font-size:.82rem;color:var(--text);}
.search-item-meta{display:flex;align-items:center;gap:.65rem;}
.search-item-ticker{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--gold);}
.search-item-mkt{font-family:'DM Mono',monospace;font-size:.55rem;padding:.12rem .38rem;border-radius:.2rem;background:rgba(191,155,94,.08);color:var(--muted);border:1px solid var(--border-gold);}
.search-msg{padding:1rem 1.1rem;font-family:'DM Mono',monospace;font-size:.72rem;color:var(--muted);text-align:center;}

/* WELCOME */
.welcome-state{text-align:center;padding:5rem 2rem;}
.welcome-icon{font-size:2.5rem;opacity:.35;margin-bottom:1.5rem;}
.welcome-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,5vw,3rem);letter-spacing:.06em;color:var(--text);margin-bottom:.6rem;}
.welcome-sub{font-size:.82rem;color:var(--muted);line-height:1.75;margin-bottom:2rem;}
.btn-start{
  padding:.85rem 2rem;background:var(--gold);color:var(--void);
  border:none;border-radius:.45rem;font-family:'DM Mono',monospace;
  font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;
  cursor:pointer;font-weight:500;transition:background .2s,transform .15s;
}
.btn-start:hover{background:var(--gold-bright);transform:translateY(-1px);}

/* STOCK HEADER */
.stock-header{display:flex;align-items:flex-start;justify-content:space-between;gap:1.25rem;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border);}
.stock-ticker-xl{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.2rem,6vw,3.8rem);letter-spacing:.05em;color:var(--gold);line-height:1;}
.stock-name-sm{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--muted);margin-top:.2rem;letter-spacing:.04em;}
.stock-mkt-badge{display:inline-block;font-family:'DM Mono',monospace;font-size:.55rem;padding:.2rem .5rem;border-radius:.2rem;border:1px solid var(--border-gold);color:var(--gold);background:rgba(191,155,94,.07);letter-spacing:.1em;margin-top:.45rem;}
.btn-brief{
  padding:.7rem 1.35rem;background:var(--gold);color:var(--void);
  border:none;border-radius:.4rem;font-family:'DM Mono',monospace;
  font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;
  cursor:pointer;font-weight:500;flex-shrink:0;transition:background .2s,transform .15s;
}
.btn-brief:hover{background:var(--gold-bright);transform:translateY(-1px);}
.btn-brief:disabled{opacity:.45;cursor:not-allowed;transform:none;}

/* LOADING */
.briefing-loading{text-align:center;padding:3.5rem 2rem;}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .75s linear infinite;margin:0 auto 1rem;}
@keyframes spin{to{transform:rotate(360deg);}}
.briefing-status{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--muted);letter-spacing:.1em;}

/* BRIEFING */
.briefing-ts{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted);letter-spacing:.08em;margin-bottom:1.1rem;}
.briefing-grid{display:grid;gap:.85rem;}
.news-card{background:var(--surface);border:1px solid var(--border);border-radius:.65rem;padding:1.35rem;position:relative;overflow:hidden;transition:border-color .2s;}
.news-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;}
.news-card.positive::before{background:var(--positive);}
.news-card.negative::before{background:var(--negative);}
.news-card.neutral::before{background:var(--gold);}
.news-card:hover{border-color:rgba(232,227,217,.14);}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:.75rem;margin-bottom:.85rem;}
.news-title{font-size:.82rem;color:var(--text);line-height:1.55;font-weight:500;}
.news-link{color:var(--muted);text-decoration:none;font-family:'DM Mono',monospace;font-size:.68rem;display:flex;align-items:center;gap:.2rem;flex-shrink:0;transition:color .15s;}
.news-link:hover{color:var(--gold);}
.badge{display:inline-flex;align-items:center;gap:.3rem;padding:.2rem .6rem;border-radius:.2rem;font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.08em;font-weight:500;margin-bottom:.75rem;}
.badge.positive{background:rgba(82,201,126,.1);color:var(--positive);border:1px solid rgba(82,201,126,.22);}
.badge.negative{background:rgba(232,88,88,.1);color:var(--negative);border:1px solid rgba(232,88,88,.22);}
.badge.neutral{background:rgba(191,155,94,.1);color:var(--gold);border:1px solid rgba(191,155,94,.22);}
.news-summary{font-size:.82rem;color:var(--text);line-height:1.65;margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid var(--border);}
.impact-grid{display:grid;grid-template-columns:1fr 1fr;gap:.65rem;}
.impact-box{background:var(--surface-2);border-radius:.35rem;padding:.7rem;}
.impact-label{font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.3rem;}
.impact-text{font-size:.75rem;color:var(--text);line-height:1.55;}
.no-result{text-align:center;padding:3.5rem 2rem;}
.no-result p{font-family:'DM Mono',monospace;font-size:.75rem;color:var(--muted);}
.btn-remove-stock{background:transparent;border:none;color:var(--muted);cursor:pointer;font-family:'DM Mono',monospace;font-size:.65rem;padding:.3rem;border-radius:.25rem;transition:color .15s;display:block;margin-top:1.25rem;}
.btn-remove-stock:hover{color:var(--negative);}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--border-gold);}

/* RESPONSIVE */
@media(max-width:580px){
  .impact-grid{grid-template-columns:1fr;}
  .stock-header{flex-direction:column;gap:.85rem;}
  .btn-brief{width:100%;justify-content:center;display:flex;}
  .main-content{padding:1.25rem 1rem 3rem;}
  .nav-user{display:none;}
}
</style>
</head>
<body>

<svg class="noise-overlay" xmlns="http://www.w3.org/2000/svg">

  </div>
</div>

<!-- APP -->
<div id="screen-app" class="screen" style="flex-direction:column;">
  <nav class="navbar">
    <div class="nav-logo">B<span>U</span>LLETIN</div>
    <div class="nav-sep"></div>
    <div class="nav-tabs" id="nav-tabs"></div>
    <div class="nav-right">

  <div class="main-content">

      <span class="guest-notice-text">비로그인 — 종목 저장은 로그인 후 이용할 수 있습니다</span>
      <button class="btn-login-prompt" onclick="goToAuth()">로그인</button>
    </div>

    <div class="search-section" id="search-section" style="display:none;">
      <span class="search-label">종목 검색</span>
      <div class="search-wrapper">
        <input type="text" class="search-input" id="search-input"
          placeholder="종목명 또는 티커 입력 (예: 삼성전자, AAPL, QQQ)"
          autocomplete="off"/>
        <div class="search-dropdown" id="search-dropdown"></div>
      </div>
    </div>

    <div id="state-welcome" class="welcome-state">
      <div class="welcome-icon">📰</div>
      <div class="welcome-title">오늘의 브리핑</div>
      <p class="welcome-sub">관심 종목을 검색하고<br>AI 뉴스 분석을 확인하세요</p>
      <button class="btn-start" onclick="focusSearch()">종목 검색 시작</button>

    <div id="state-stock" style="display:none;">

      </div>
      <div id="briefing-area"></div>
    </div>
  </div>
</div>

  {ticker:'122630',name:'KODEX 레버리지',market:'KR'},
  {ticker:'304940',name:'TIGER K-게임',market:'KR'},
  {ticker:'139230',name:'TIGER 200 IT',market:'KR'},
  {ticker:'091170',name:'KODEX 은행',market:'KR'},
];

// ━━━ INIT ━━━
async function initApp() {
  const authEl = document.getElementById('auth-content');
  authEl.style.opacity = '0';
  authEl.style.transform = 'translateY(24px)';

  try {
    const res = await fetch('/api/config');
    const cfg = await res.json();
    const { createClient } = window.supabase;
    sb = createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);

    // 기존 세션 확인
    const { data:{ session } } = await sb.auth.getSession();
    if (session?.user) {
      currentUser = session.user;
      enterApp();
      return;
    }

    // Auth 상태 변화 구독 (SIGNED_IN 이벤트만)
    sb.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_IN' && session?.user && !appEntered) {
        currentUser = session.user;
        enterApp();
      } else if (event === 'SIGNED_OUT') {
        resetState();
        goToAuth();
      }
    });
  } catch(e) {
    console.error('Init error:', e);
  }

  showScreen('auth');
  gsap.to('#auth-content', {opacity:1, y:0, duration:.9, ease:'power3.out', delay:.1});
}

// ━━━ AUTH ━━━
async function handleGoogleLogin() {
  if (!sb) { alert('잠시 후 다시 시도해주세요.'); return; }
  const { error } = await sb.auth.signInWithOAuth({
    provider:'google',
    options:{ redirectTo: window.location.origin }
  });
  if (error) alert('로그인 오류: ' + error.message);
}

function handleGuestMode() {
  isGuest = true;
  currentUser = null;
  enterApp();
}

async function handleLogout() {
  if (sb && !isGuest) await sb.auth.signOut();
  resetState();
  goToAuth();
}

// FIX #4: 모든 상태를 한 곳에서 초기화
function resetState() {
  appEntered = false;
  searchInited = false;
  isGuest = false;
  currentUser = null;
  portfolio = [];
  currentStock = null;
}

function goToAuth() {
  showScreen('auth');
  gsap.fromTo('#auth-content', {opacity:0,y:16}, {opacity:1,y:0,duration:.7,ease:'power3.out'});
}

// ━━━ ENTER APP ━━━
async function enterApp() {
  // FIX #1: 중복 진입 방지
  if (appEntered) return;
  appEntered = true;

  isGuest = !currentUser;
  showScreen('app');

  const navUser = document.getElementById('nav-user');
  const authBtn = document.getElementById('btn-auth-action');

  if (currentUser) {
    navUser.textContent = (currentUser.email || '').split('@')[0];
    authBtn.textContent = '로그아웃';
    authBtn.onclick = handleLogout;
  } else {
    navUser.textContent = '비로그인';
    authBtn.textContent = '로그인';
    authBtn.onclick = goToAuth;
  }

  document.getElementById('guest-notice').style.display = isGuest ? 'flex' : 'none';
  document.getElementById('search-section').style.display = 'block';

  // FIX #3: portfolio 초기화 후 로드
  portfolio = [];
  if (currentUser && sb) await loadPortfolio();

  renderTabs();
  showState('welcome');
  initSearch(); // FIX #2: searchInited 플래그로 중복 방지
}

// ━━━ PORTFOLIO ━━━
async function loadPortfolio() {
  const { data, error } = await sb.from('portfolios')
    .select('*')
    .eq('user_id', currentUser.id)
    .order('created_at', {ascending:true});
  if (!error && data) portfolio = data;
  else if (error) console.warn('loadPortfolio:', error);
}

async function addToPortfolio(stock) {
  // 게스트: 바로 selectStock
  if (isGuest) {
    selectStock(stock);
    return;
  }

  if (portfolio.length >= 10) {
    alert('종목은 최대 10개까지 등록할 수 있습니다.');
    return;
  }

  // 이미 있으면 그냥 선택
  const existing = portfolio.find(p => p.ticker === stock.ticker);
  if (existing) {
    selectStock(existing);
    return;
  }

  try {
    const { data, error } = await sb.from('portfolios')
      .insert({
        user_id: currentUser.id,
        ticker: stock.ticker,
        name: stock.name,
        market: stock.market
      })
      .select()
      .single();

    if (!error && data) {
      portfolio.push(data);
      renderTabs();
      selectStock(data);
    } else {
      // insert 실패해도 화면엔 보여줌
      console.warn('Portfolio insert error:', error);
      selectStock(stock);
    }
  } catch(e) {
    console.error('addToPortfolio exception:', e);
    selectStock(stock);
  }
}

async function removeFromPortfolio(id) {
  if (!sb || !currentUser) return;
  await sb.from('portfolios').delete().eq('id', id);
  portfolio = portfolio.filter(p => p.id !== id);
  renderTabs();
  if (currentStock?.id === id) {
    currentStock = null;
    showState('welcome');
  }
}

// ━━━ TABS ━━━
function renderTabs() {
  const c = document.getElementById('nav-tabs');
  c.innerHTML = '';
  portfolio.forEach(s => {
    const t = document.createElement('button');
    t.className = 'nav-tab' + (currentStock?.ticker === s.ticker ? ' active' : '');
    t.textContent = s.ticker;
    t.title = s.name;
    t.onclick = () => selectStock(s);
    c.appendChild(t);
  });
  if (!isGuest && portfolio.length < 10) {
    const a = document.createElement('button');
    a.className = 'nav-tab add-tab';
    a.textContent = '+ 종목 추가';
    a.onclick = focusSearch;
    c.appendChild(a);
  }
}

function selectStock(stock) {
  currentStock = stock;
  document.getElementById('disp-ticker').textContent = stock.ticker;
  document.getElementById('disp-name').textContent = stock.name;
  document.getElementById('disp-market').textContent =
    stock.market === 'KR' ? '🇰🇷 한국 주식' : '🇺🇸 미국 주식';
  document.getElementById('briefing-area').innerHTML = '';
  const btn = document.getElementById('btn-brief');
  btn.disabled = false;
  btn.textContent = '브리핑 보기';
  showState('stock');
  renderTabs();
  window.scrollTo({top:0, behavior:'smooth'});
}

// ━━━ SEARCH ━━━
function initSearch() {
  // FIX #2: 이벤트 리스너 중복 등록 방지
  if (searchInited) return;
  searchInited = true;

  const input = document.getElementById('search-input');
  const dd = document.getElementById('search-dropdown');

  input.addEventListener('input', e => {
    clearTimeout(searchTimer);
    const q = e.target.value.trim();
    if (!q) { dd.classList.remove('open'); dd.innerHTML = ''; return; }
    searchTimer = setTimeout(() => doSearch(q), 280);
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.search-wrapper')) dd.classList.remove('open');
  });
}

async function doSearch(q) {
  const dd = document.getElementById('search-dropdown');
  dd.innerHTML = '<div class="search-msg">검색 중...</div>';
  dd.classList.add('open');

  const results = [];
  const hasKorean = /[가-힣]/.test(q);

  if (hasKorean) {
    KR_STOCKS.filter(s => s.name.includes(q) || s.ticker.includes(q))
      .slice(0,7).forEach(s => results.push(s));
  } else {
    try {
      const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
      const data = await res.json();
      (data.result||[]).slice(0,6).forEach(s =>
        results.push({ticker:s.symbol, name:s.description, market:'US'})
      );
    } catch(e) { console.error(e); }
    KR_STOCKS.filter(s =>
      s.ticker.startsWith(q.toUpperCase()) ||
      s.name.toUpperCase().includes(q.toUpperCase())
    ).slice(0,3).forEach(s => results.push(s));
  }

  if (!results.length) {
    dd.innerHTML = '<div class="search-msg">검색 결과가 없습니다</div>';
    return;
  }

  dd.innerHTML = '';
  results.slice(0,8).forEach(stock => {
    const item = document.createElement('div');
    item.className = 'search-item';
    item.innerHTML = `
      <span class="search-item-name">${esc(stock.name)}</span>
      <div class="search-item-meta">
        <span class="search-item-ticker">${esc(stock.ticker)}</span>
        <span class="search-item-mkt">${stock.market==='KR'?'KRX':'US'}</span>
      </div>`;
    item.onclick = () => {
      document.getElementById('search-input').value = '';
      dd.classList.remove('open');
      dd.innerHTML = '';
      addToPortfolio(stock);
    };
    dd.appendChild(item);
  });
}

function focusSearch() {
  const el = document.getElementById('search-input');
  if (!el) return;
  el.scrollIntoView({behavior:'smooth', block:'center'});
  setTimeout(() => el.focus(), 300);
}

// ━━━ BRIEFING ━━━
async function fetchBriefing() {
  if (!currentStock) return;
  const btn = document.getElementById('btn-brief');
  const area = document.getElementById('briefing-area');

  btn.disabled = true;
  btn.textContent = '분석 중...';

  const setStatus = msg => {
    area.innerHTML = `<div class="briefing-loading"><div class="spinner"></div><div class="briefing-status">${msg}</div></div>`;
  };

  try {
    let articles = [];

    if (currentStock.market === 'KR') {
      setStatus('네이버 뉴스 수집 중...');
      const res = await fetch(`/api/naver?query=${encodeURIComponent(currentStock.name)}`);
      const data = await res.json();
      articles = (data.items||[]).map(a => ({
        title: a.title,
        description: a.description,
        url: a.originallink || a.link,
      }));
    } else {
      setStatus('Finnhub 뉴스 수집 중...');
      const res = await fetch(`/api/finnhub?symbol=${encodeURIComponent(currentStock.ticker)}`);
      const data = await res.json();
      articles = (Array.isArray(data)?data:[]).map(a => ({
        title: a.headline,
        description: a.summary,
        url: a.url,
      }));
    }

    if (!articles.length) {
      area.innerHTML = '<div class="no-result"><p>최근 뉴스를 찾을 수 없습니다</p></div>';
      btn.textContent = '다시 시도';
      return;
    }

    setStatus(`AI 분석 중 · ${articles.length}개 기사`);

    const groqRes = await fetch('/api/groq', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        ticker: currentStock.ticker,
        name: currentStock.name,
        articles,
        market: currentStock.market,
      }),
    });
    const groqData = await groqRes.json();
    const analyses = groqData.analyses || [];

    if (!analyses.length) {
      area.innerHTML = '<div class="no-result"><p>분석 결과를 가져올 수 없습니다</p></div>';
      btn.textContent = '다시 시도';
      return;
    }

    // FIX #5: history save를 non-blocking으로 처리 (실패해도 렌더링엔 영향 없음)
    if (currentUser && sb) {
      const rows = analyses.map(a => ({
        user_id: currentUser.id,
        ticker: currentStock.ticker,
        title: a.title,
        summary: a.summary,
        sentiment: a.sentiment,
        impact_short: a.impact_short,
        impact_long: a.impact_long,
        url: a.url,
      }));
      sb.from('news_history').insert(rows).then(({error}) => {
        if (error) console.warn('History save error:', error);
      });
    }

    renderBriefing(analyses);
    btn.textContent = '새로고침';

  } catch(e) {
    console.error('fetchBriefing error:', e);
    area.innerHTML = `<div class="no-result"><p>오류: ${esc(e.message)}</p></div>`;
    btn.textContent = '다시 시도';
  } finally {
    // FIX #6: 어떤 경우에도 버튼은 다시 활성화
    btn.disabled = false;
  }
}

function renderBriefing(analyses) {
  const area = document.getElementById('briefing-area');
  const now = new Date().toLocaleString('ko-KR',{month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'});

  let html = `<div class="briefing-ts">브리핑 · ${now} · ${analyses.length}건 분석</div>`;
  html += '<div class="briefing-grid">';

  analyses.forEach(item => {
    const cls = item.sentiment==='호재'?'positive':item.sentiment==='악재'?'negative':'neutral';
    const icon = item.sentiment==='호재'?'↑':item.sentiment==='악재'?'↓':'—';
    html += `
    <div class="news-card ${cls}">
      <div class="card-top">
        <span class="news-title">${esc(item.title)}</span>
        ${item.url?`<a href="${esc(item.url)}" target="_blank" rel="noopener" class="news-link">원문 →</a>`:''}
      </div>
      <span class="badge ${cls}">${icon} ${esc(item.sentiment)}</span>
      <div class="news-summary">${esc(item.summary)}</div>
      <div class="impact-grid">
        <div class="impact-box">
          <div class="impact-label">단기 영향 · 1–4주</div>
          <div class="impact-text">${esc(item.impact_short)}</div>
        </div>
        <div class="impact-box">
          <div class="impact-label">장기 영향 · 3개월+</div>
          <div class="impact-text">${esc(item.impact_long)}</div>
        </div>
      </div>
    </div>`;
  });

  html += '</div>';

  if (currentUser && currentStock?.id) {
    html += `<button class="btn-remove-stock" onclick="confirmRemove('${currentStock.id}')">이 종목 삭제</button>`;
  }

  area.innerHTML = html;

  // GSAP 카드 애니메이션
  const cards = area.querySelectorAll('.news-card');
  gsap.fromTo(cards,
    {opacity:0, y:14},
    {opacity:1, y:0, duration:.4, stagger:.07, ease:'power2.out'}
  );
}

function confirmRemove(id) {
  if (confirm('이 종목을 포트폴리오에서 삭제할까요?')) removeFromPortfolio(id);
}

// ━━━ HELPERS ━━━
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(`screen-${name}`);
  if (el) el.classList.add('active');
}

function showState(name) {
  document.getElementById('state-welcome').style.display = name==='welcome'?'block':'none';
  document.getElementById('state-stock').style.display   = name==='stock'  ?'block':'none';
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

window.addEventListener('DOMContentLoaded', initApp);
</script>
